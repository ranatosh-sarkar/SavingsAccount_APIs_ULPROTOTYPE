spring.application.name=UL Savings Account API
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect
# 👇 Environment-based config for Oracle Autonomous DB (from GitHub Secrets)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# ✅ Expose on container port 8080 for Azure ACI
server.port=8080
# ✅ Keep your existing API path
server.servlet.context-path=/UL_SavingsAccount-API_prototype

